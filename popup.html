<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusEnforcer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="popup-root">
      <header>
        <h1 id="header-title">contra.</h1>
      </header>

      <div id="status-area" aria-live="polite"></div>

      <section class="power-section" aria-label="Power toggle">
        <input id="power-toggle" name="power-toggle" type="checkbox" />
        <label id="power-toggle-label" for="power-toggle">
          <span class="sr-only">Enable blocking</span>
        </label>
      </section>

      <div id="lockable-area">
        <div id="unlock-challenge" aria-hidden="true">
          <label for="unlock-phrase-input">Unlock phrase</label>
          <div id="unlock-typing-surface">
            <input
              id="unlock-phrase-input"
              name="unlock-phrase-input"
              type="text"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
            <div
              id="unlock-phrase-display"
              aria-label="Type unlock phrase"
            ></div>
            <span id="unlock-phrase-caret" aria-hidden="true"></span>
          </div>
          <button id="unlock-confirm-btn" type="button">Confirm</button>
        </div>

        <details id="settings-dropdown">
          <summary id="settings-summary" aria-label="Settings" data-label="Settings"></summary>
          <div id="settings-blur-wrap">
            <section id="settings-area" aria-label="Settings">
              <div class="control-group">
                <label for="mode-select">Mode</label>
                <select id="mode-select" name="mode-select">
                  <option value="block">Blocklist</option>
                  <option value="allow">Whitelist</option>
                </select>
              </div>

              <div class="control-group">
                <label for="url-list">URLs (one per line)</label>
                <textarea
                  id="url-list"
                  name="url-list"
                  rows="1"
                  placeholder="example.com"
                ></textarea>
                <p id="url-list-error" class="field-error" role="alert" hidden></p>
              </div>

              <div class="control-group">
                <label for="unlock-mode-select">Unlock mode</label>
                <select id="unlock-mode-select" name="unlock-mode-select">
                  <option value="timer">Timer</option>
                  <option value="phrase">Phrase</option>
                </select>
              </div>

              <details id="unlock-phrase-setting-dropdown" class="settings-sub-dropdown">
                <summary id="unlock-phrase-setting-summary">Unlock phrase</summary>
                <div class="control-group">
                  <label class="sr-only" for="unlock-phrase-setting">Unlock phrase</label>
                  <textarea
                    id="unlock-phrase-setting"
                    name="unlock-phrase-setting"
                    rows="2"
                    spellcheck="false"
                    placeholder="I swear to God and to my future self that I don't want to ruin my cognitive abilities"
                  ></textarea>
                </div>
              </details>

              <div id="timer-settings-group" class="control-group">
                <label for="timer-end-time">Timer (double click to edit)</label>
                <div id="timer-presets" class="timer-presets" aria-label="Timer presets">
                  <button class="timer-preset-btn" type="button" data-preset-index="0">15m</button>
                  <button class="timer-preset-btn" type="button" data-preset-index="1">25m</button>
                  <button class="timer-preset-btn" type="button" data-preset-index="2">45m</button>
                  <button class="timer-preset-btn" type="button" data-preset-index="3">60m</button>
                </div>
                <div class="timer-row">
                  <label for="timer-end-time">End time</label>
                </div>
                <input
                  id="timer-end-time"
                  name="timer-end-time"
                  type="text"
                  inputmode="numeric"
                  maxlength="5"
                  placeholder="23:59"
                  pattern="^([01]\\d|2[0-3]):([0-5]\\d)$"
                  autocomplete="off"
                />
              </div>
            </section>
          </div>
        </details>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
