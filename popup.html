<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusEnforcer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="popup-root">
      <header>
        <h1 id="header-title">contra.</h1>
      </header>

      <div id="status-area" aria-live="polite"></div>
      <section id="managed-lock-area" aria-live="polite">
        <p id="managed-lock-badge" class="managed-lock-badge is-checking">
          Managed lock: checking...
        </p>
        <p id="managed-lock-detail" class="managed-lock-detail">
          Enterprise policy status has not been verified yet.
        </p>
      </section>

      <section class="power-section" aria-label="Power toggle">
        <input id="power-toggle" name="power-toggle" type="checkbox" />
        <label id="power-toggle-label" for="power-toggle">
          <span class="sr-only">Enable blocking</span>
        </label>
      </section>

      <div id="lockable-area">
        <div id="unlock-challenge" aria-hidden="true">
          <label for="unlock-phrase-input">Unlock phrase</label>
          <input
            id="unlock-phrase-input"
            name="unlock-phrase-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="Type phrase"
          />
          <button id="unlock-confirm-btn" type="button">Confirm</button>
        </div>

        <details id="settings-dropdown">
          <summary>Settings</summary>
          <div id="settings-blur-wrap">
            <section id="settings-area" aria-label="Settings">
              <section class="test-controls" aria-label="Testing controls">
                <button id="test-disable-btn" type="button">Temporary Disable (60s)</button>
              </section>

              <div class="control-group">
                <label for="mode-select">Mode</label>
                <select id="mode-select" name="mode-select">
                  <option value="block">Blocklist</option>
                  <option value="allow">Whitelist</option>
                </select>
              </div>

              <div class="control-group">
                <label for="url-list">URLs (one per line)</label>
                <textarea
                  id="url-list"
                  name="url-list"
                  rows="5"
                  placeholder="example.com"
                ></textarea>
              </div>

              <div class="control-group">
                <label for="unlock-mode-select">Unlock mode</label>
                <select id="unlock-mode-select" name="unlock-mode-select">
                  <option value="timer">Timer</option>
                  <option value="phrase">Phrase</option>
                </select>
              </div>

              <div class="control-group">
                <div class="timer-row">
                  <label for="timer-minutes">Timer duration</label>
                  <output id="timer-minutes-value" for="timer-minutes">25 min</output>
                </div>
                <input
                  id="timer-minutes"
                  name="timer-minutes"
                  type="range"
                  min="1"
                  max="180"
                  step="1"
                  value="25"
                />
              </div>
            </section>
          </div>
        </details>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
